name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python linters
        run: pip install flake8

      - name: Lint Python - API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python - Worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Install ESLint
        run: cd frontend && npm install --save-dev eslint@8 @eslint/js

      - name: Create ESLint config
        run: |
          cat > frontend/.eslintrc.json << 'ESLINT'
          {
            "env": { "node": true, "es2021": true },
            "extends": "eslint:recommended",
            "parserOptions": { "ecmaVersion": 2021 }
          }
          ESLINT

      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js

      - name: Install Hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install fastapi==0.111.0 uvicorn==0.29.0 redis==5.0.4 \
            pytest pytest-cov httpx fakeredis

      - name: Create test file
        run: |
          cat > api/test_main.py << 'PYTEST'
          import pytest
          from fastapi.testclient import TestClient
          from unittest.mock import patch, MagicMock
          import fakeredis

          fake_redis = fakeredis.FakeRedis(decode_responses=True)

          with patch("redis.Redis", return_value=fake_redis):
              from main import app

          client = TestClient(app)

          def test_create_job_returns_job_id():
              response = client.post("/jobs")
              assert response.status_code == 200
              data = response.json()
              assert "job_id" in data
              assert len(data["job_id"]) == 36

          def test_get_job_status_queued():
              response = client.post("/jobs")
              job_id = response.json()["job_id"]
              status_response = client.get(f"/jobs/{job_id}")
              assert status_response.status_code == 200
              assert status_response.json()["status"] == "queued"

          def test_get_job_not_found():
              response = client.get("/jobs/nonexistent-id")
              assert response.status_code == 200
              assert "error" in response.json()

          def test_create_multiple_jobs():
              ids = set()
              for _ in range(3):
                  r = client.post("/jobs")
                  assert r.status_code == 200
                  ids.add(r.json()["job_id"])
              assert len(ids) == 3

          def test_job_status_returns_job_id():
              response = client.post("/jobs")
              job_id = response.json()["job_id"]
              status_response = client.get(f"/jobs/{job_id}")
              assert status_response.json()["job_id"] == job_id
          PYTEST

      - name: Run tests with coverage
        run: |
          cd api && pytest test_main.py -v --cov=main --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image names
        run: |
          echo "localhost:5000/api:${{ github.sha }}" > image-tags.txt
          echo "localhost:5000/worker:${{ github.sha }}" >> image-tags.txt
          echo "localhost:5000/frontend:${{ github.sha }}" >> image-tags.txt

      - name: Upload image tags
        uses: actions/upload-artifact@v4
        with:
          name: image-tags
          path: image-tags.txt

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Install Trivy
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            localhost:5000/api:${{ github.sha }}

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            localhost:5000/worker:${{ github.sha }}

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            localhost:5000/frontend:${{ github.sha }}

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for integration test
        run: |
          echo "REDIS_PASSWORD=testpassword123" > .env
          echo "APP_ENV=test" >> .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for all services healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            healthy=$(docker compose ps --format json | \
              python3 -c "
          import sys, json
          data = sys.stdin.read().strip().split('\n')
          services = [json.loads(l) for l in data if l]
          all_healthy = all(
            s.get('Health','') in ['healthy',''] 
            for s in services
          )
          print('yes' if all_healthy else 'no')
          ")
            if [ "$healthy" = "yes" ]; then
              echo "All services healthy"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 5
          done

      - name: Run integration test
        run: |
          # Submit a job through the frontend
          JOB_RESPONSE=$(docker exec \
            $(docker compose ps -q frontend) \
            node -e "
          const axios = require('axios');
          axios.post('http://api:8000/jobs')
            .then(r => { console.log(JSON.stringify(r.data)); process.exit(0); })
            .catch(e => { console.error(e.message); process.exit(1); });
          ")
          echo "Job response: $JOB_RESPONSE"
          JOB_ID=$(echo $JOB_RESPONSE | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['job_id'])")
          echo "Job ID: $JOB_ID"

          # Poll until completed or timeout
          for i in $(seq 1 15); do
            STATUS=$(docker exec \
              $(docker compose ps -q frontend) \
              node -e "
          const axios = require('axios');
          axios.get('http://api:8000/jobs/$JOB_ID')
            .then(r => { console.log(r.data.status); process.exit(0); })
            .catch(e => { console.error(e.message); process.exit(1); });
            ")
            echo "Poll $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/hngdevops/app

            # Pull latest code
            git pull origin main

            # Build new images
            docker compose build

            # Rolling update - start new, verify health, stop old
            docker compose up -d --no-deps --build api
            timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" $(docker compose ps -q api) | grep -q healthy; do sleep 2; done' || \
              { echo "API health check failed - aborting deploy"; exit 1; }

            docker compose up -d --no-deps --build worker
            docker compose up -d --no-deps --build frontend
            timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" $(docker compose ps -q frontend) | grep -q healthy; do sleep 2; done' || \
              { echo "Frontend health check failed - aborting deploy"; exit 1; }

            echo "Deploy successful"
