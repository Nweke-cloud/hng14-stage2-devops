name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python linters
        run: pip install flake8

      - name: Lint Python - API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python - Worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint JavaScript
        run: |
          npm install -g eslint@8
          eslint frontend/app.js --env node --env es2021 --parser-options ecmaVersion:2021

      - name: Install Hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install fastapi==0.111.0 uvicorn==0.29.0 redis==5.0.4 \
            pytest pytest-cov httpx fakeredis

      - name: Create test file
        run: |
          cat > api/test_main.py << 'PYTEST'
          import pytest
          from fastapi.testclient import TestClient
          import fakeredis
          from unittest.mock import patch

          fake_redis = fakeredis.FakeRedis(decode_responses=True)

          with patch("redis.Redis", return_value=fake_redis):
              from main import app

          client = TestClient(app)


          def test_create_job_returns_job_id():
              response = client.post("/jobs")
              assert response.status_code == 200
              data = response.json()
              assert "job_id" in data
              assert len(data["job_id"]) == 36


          def test_get_job_status_queued():
              response = client.post("/jobs")
              job_id = response.json()["job_id"]
              status_response = client.get(f"/jobs/{job_id}")
              assert status_response.status_code == 200
              assert status_response.json()["status"] == "queued"


          def test_get_job_not_found():
              response = client.get("/jobs/nonexistent-id")
              assert response.status_code == 200
              assert "error" in response.json()


          def test_create_multiple_jobs():
              ids = set()
              for _ in range(3):
                  r = client.post("/jobs")
                  assert r.status_code == 200
                  ids.add(r.json()["job_id"])
              assert len(ids) == 3


          def test_job_status_returns_job_id():
              response = client.post("/jobs")
              job_id = response.json()["job_id"]
              status_response = client.get(f"/jobs/{job_id}")
              assert status_response.json()["job_id"] == job_id
          PYTEST

      - name: Run tests with coverage
        run: |
          cd api && pytest test_main.py -v --cov=main --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t api:scan ./api
          docker build -t worker:scan ./worker
          docker build -t frontend:scan ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sudo sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            api:scan

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            worker:scan

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            frontend:scan

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for integration test
        run: |
          echo "REDIS_PASSWORD=testpassword123" > .env
          echo "APP_ENV=test" >> .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for all services healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            COUNT=$(docker compose ps --format json 2>/dev/null | \
              python3 -c "
          import sys, json
          lines = [l for l in sys.stdin.read().strip().split('\n') if l]
          services = [json.loads(l) for l in lines]
          healthy = sum(1 for s in services if s.get('Health','') == 'healthy')
          print(healthy)
          " 2>/dev/null || echo "0")
            echo "Healthy services: $COUNT/4"
            if [ "$COUNT" = "4" ]; then
              echo "All services healthy"
              break
            fi
            sleep 5
          done

      - name: Run integration test
        run: |
          FRONTEND=$(docker compose ps -q frontend)
          JOB_RESPONSE=$(docker exec $FRONTEND node -e "
          const axios = require('axios');
          axios.post('http://api:8000/jobs')
            .then(r => { console.log(JSON.stringify(r.data)); process.exit(0); })
            .catch(e => { console.error(e.message); process.exit(1); });
          ")
          echo "Job response: $JOB_RESPONSE"
          JOB_ID=$(echo $JOB_RESPONSE | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['job_id'])")
          echo "Job ID: $JOB_ID"
          for i in $(seq 1 15); do
            STATUS=$(docker exec $FRONTEND node -e "
          const axios = require('axios');
          axios.get('http://api:8000/jobs/$JOB_ID')
            .then(r => { console.log(r.data.status); process.exit(0); })
            .catch(e => { console.error(e.message); process.exit(1); });
            ")
            echo "Poll $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed"
              exit 0
            fi
            sleep 2
          done
          echo "FAILED: job did not complete"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/hngdevops/app
            git pull origin main
            docker compose build
            docker compose up -d --no-deps --build api
            timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" $(docker compose ps -q api) | grep -q healthy; do sleep 2; done' || \
              { echo "API health check failed"; exit 1; }
            docker compose up -d --no-deps --build worker
            docker compose up -d --no-deps --build frontend
            timeout 60 bash -c 'until docker inspect --format="{{.State.Health.Status}}" $(docker compose ps -q frontend) | grep -q healthy; do sleep 2; done' || \
              { echo "Frontend health check failed"; exit 1; }
            echo "Deploy successful"
